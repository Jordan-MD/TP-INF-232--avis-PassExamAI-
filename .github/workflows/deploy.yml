name: Sync Backend to Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - "backend/**" # se déclenche SEULEMENT si backend change
      - "Dockerfile"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend only to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Préparer un dossier de déploiement propre
          mkdir /tmp/hf-deploy
          cp -r backend/. /tmp/hf-deploy/

          cd /tmp/hf-deploy
          git init
          git checkout -b main
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M')"
          git push --force \
            https://Jordan001237:${HF_TOKEN}@huggingface.co/spaces/Jordan001237/TP-INF-232 main
